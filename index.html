<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Online Piano</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='black'/%3E%3Crect x='14' y='14' width='72' height='72' rx='10' fill='white'/%3E%3Crect x='30' y='14' width='10' height='42' fill='black'/%3E%3Crect x='60' y='14' width='10' height='42' fill='black'/%3E%3C/svg%3E">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui,sans-serif
}
body{
background:linear-gradient(135deg,#070707,#101010,#151515);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white
}
.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(255,255,255,.06),transparent 20%),
radial-gradient(circle at 80% 70%,rgba(255,255,255,.04),transparent 20%);
pointer-events:none
}
.container{
width:min(1500px,96%);
padding:30px
}
.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:35px;
gap:20px;
flex-wrap:wrap
}
.logo{
display:flex;
align-items:center;
gap:16px
}
.logo-icon{
width:70px;
height:70px;
border-radius:20px;
background:white;
position:relative;
overflow:hidden;
box-shadow:0 10px 30px rgba(255,255,255,.15)
}
.logo-icon::before{
content:"";
position:absolute;
left:20px;
top:0;
width:10px;
height:40px;
background:black
}
.logo-icon::after{
content:"";
position:absolute;
right:20px;
top:0;
width:10px;
height:40px;
background:black
}
h1{
font-size:clamp(2rem,4vw,4rem);
font-weight:900;
letter-spacing:-2px
}
.subtitle{
opacity:.7;
margin-top:4px
}
.controls{
display:flex;
align-items:center;
gap:18px;
flex-wrap:wrap
}
.control{
background:rgba(255,255,255,.06);
backdrop-filter:blur(14px);
padding:14px 18px;
border-radius:18px;
border:1px solid rgba(255,255,255,.08);
display:flex;
align-items:center;
gap:10px;
min-width:180px
}
.control label{
font-size:.9rem;
opacity:.7
}
select,input{
background:transparent;
border:none;
color:white;
font-size:1rem;
outline:none;
width:100%
}
option{
background:#111
}
.piano-wrap{
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(20px);
padding:24px;
border-radius:30px;
overflow-x:auto;
box-shadow:0 20px 80px rgba(0,0,0,.45)
}
.piano{
position:relative;
display:flex;
height:420px;
user-select:none;
min-width:1400px
}
.white-key{
width:90px;
height:100%;
background:linear-gradient(to bottom,#fff,#f0f0f0,#d9d9d9);
border:1px solid #999;
border-radius:0 0 18px 18px;
position:relative;
display:flex;
justify-content:flex-end;
align-items:center;
flex-direction:column;
padding-bottom:22px;
cursor:pointer;
transition:.08s;
color:black;
font-weight:700
}
.white-key.active{
background:linear-gradient(to bottom,#d7d7d7,#bcbcbc);
transform:translateY(4px)
}
.white-key span{
font-size:1rem
}
.black-key{
position:absolute;
width:58px;
height:250px;
background:linear-gradient(to bottom,#3a3a3a,#000);
border-radius:0 0 14px 14px;
z-index:3;
border:1px solid #555;
display:flex;
justify-content:flex-end;
align-items:center;
flex-direction:column;
padding-bottom:16px;
color:white;
font-weight:700;
cursor:pointer;
transition:.08s;
box-shadow:0 10px 20px rgba(0,0,0,.6)
}
.black-key.active{
transform:translateY(4px);
background:linear-gradient(to bottom,#111,#000)
}
.footer{
margin-top:26px;
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
flex-wrap:wrap
}
.info{
opacity:.7
}
kbd{
background:#1d1d1d;
padding:5px 10px;
border-radius:8px;
border:1px solid rgba(255,255,255,.08)
}
.visualizer{
display:flex;
gap:6px;
align-items:flex-end;
height:40px
}
.bar{
width:6px;
height:10px;
background:white;
border-radius:10px;
animation:bounce 1s infinite ease-in-out;
opacity:.7
}
.bar:nth-child(2){animation-delay:.1s}
.bar:nth-child(3){animation-delay:.2s}
.bar:nth-child(4){animation-delay:.3s}
.bar:nth-child(5){animation-delay:.4s}
@keyframes bounce{
0%,100%{height:10px}
50%{height:36px}
}
@media(max-width:900px){
.piano{
transform:scale(.82);
transform-origin:left top;
height:340px
}
}
</style>
</head>
<body>
<div class="bg"></div>

<div class="container">
<div class="top">
<div class="logo">
<div class="logo-icon"></div>
<div>
<h1>Online Piano</h1>
<div class="subtitle">Play instantly in your browser</div>
</div>
</div>

<div class="controls">
<div class="control">
<label>Instrument</label>
<select id="wave">
<option value="sine">Classic Piano</option>
<option value="triangle">Soft Piano</option>
<option value="square">Retro Piano</option>
</select>
</div>

<div class="control">
<label>Tuning</label>
<select id="tuning">
<option value="440">Standard 440Hz</option>
<option value="432">Warm 432Hz</option>
<option value="444">Bright 444Hz</option>
</select>
</div>

<div class="control">
<label>Volume</label>
<input id="volume" type="range" min="0" max="1" step="0.01" value="0.5">
</div>
</div>
</div>

<div class="piano-wrap">
<div class="piano" id="piano"></div>
</div>

<div class="footer">
<div class="info">
Click keys or use keyboard —
<kbd>A</kbd>
<kbd>W</kbd>
<kbd>S</kbd>
<kbd>E</kbd>
<kbd>D</kbd>
<kbd>F</kbd>
<kbd>T</kbd>
<kbd>G</kbd>
<kbd>Y</kbd>
<kbd>H</kbd>
<kbd>U</kbd>
<kbd>J</kbd>
</div>

<div class="visualizer">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>
</div>
</div>

<script>
const piano=document.getElementById("piano")

const whiteNotes=[
["C4",261.63],
["D4",293.66],
["E4",329.63],
["F4",349.23],
["G4",392.00],
["A4",440.00],
["B4",493.88],
["C5",523.25],
["D5",587.33],
["E5",659.25],
["F5",698.46],
["G5",783.99],
["A5",880.00],
["B5",987.77]
]

const blackNotes=[
["C#4",277.18,60],
["D#4",311.13,150],
["F#4",369.99,330],
["G#4",415.30,420],
["A#4",466.16,510],
["C#5",554.37,780],
["D#5",622.25,870],
["F#5",739.99,1050],
["G#5",830.61,1140],
["A#5",932.33,1230]
]

const keyboardMap={
a:"C4",
w:"C#4",
s:"D4",
e:"D#4",
d:"E4",
f:"F4",
t:"F#4",
g:"G4",
y:"G#4",
h:"A4",
u:"A#4",
j:"B4",
k:"C5"
}

const ctx=new(window.AudioContext||window.webkitAudioContext)()

function getTuningMultiplier(){
const tuning=parseFloat(document.getElementById("tuning").value)
return tuning/440
}

function play(freq,key){
const osc=ctx.createOscillator()
const gain=ctx.createGain()

osc.type=document.getElementById("wave").value
osc.frequency.value=freq*getTuningMultiplier()

gain.gain.setValueAtTime(0,ctx.currentTime)
gain.gain.linearRampToValueAtTime(document.getElementById("volume").value,ctx.currentTime+.02)
gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+1.2)

osc.connect(gain)
gain.connect(ctx.destination)

osc.start()
osc.stop(ctx.currentTime+1.2)

key.classList.add("active")
setTimeout(()=>key.classList.remove("active"),120)
}

whiteNotes.forEach(note=>{
const key=document.createElement("div")
key.className="white-key"
key.innerHTML=`<span>${note[0]}</span>`
key.addEventListener("mousedown",()=>play(note[1],key))
piano.appendChild(key)
})

blackNotes.forEach(note=>{
const key=document.createElement("div")
key.className="black-key"
key.style.left=note[2]+"px"
key.innerHTML=`<span>${note[0]}</span>`
key.addEventListener("mousedown",()=>play(note[1],key))
piano.appendChild(key)
})

document.addEventListener("keydown",e=>{
const noteName=keyboardMap[e.key.toLowerCase()]
if(!noteName)return

const all=[...document.querySelectorAll(".white-key,.black-key")]
all.forEach(k=>{
if(k.innerText===noteName){
const note=[...whiteNotes,...blackNotes].find(n=>n[0]===noteName)
play(note[1],k)
}
})
})
</script>
</body>
</html>
